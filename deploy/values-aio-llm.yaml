# AIO: cắm LLM thật thay mock (envOverrides = upsert, không xoá env khác).
# Secret llm-api-key tạo trước: kubectl -n techx-<aio> create secret generic llm-api-key --from-literal=key=<REAL_KEY>
components:
  product-reviews:
    envOverrides:
      - name: LLM_BASE_URL
        value: http://litellm-service:4000/v1        # Địa chỉ Service LiteLLM chạy trong cluster EKS
      - name: LLM_MODEL
        value: amazon.nova-lite-v1:0                 # Định dạng model Nova Lite chính xác
      - name: OPENAI_API_KEY
        valueFrom: { secretKeyRef: { name: llm-api-key, key: key } }
